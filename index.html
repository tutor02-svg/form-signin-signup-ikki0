<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM SIGN IN</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <h2>Sign-in Form</h2>
        <form id="signinForm">
            <div class="row">
                <label for="username">Username</label>
                <br>
                <input type="text" id="username" required placeholder="enter useranme">
            </div>

            <div class="row">
                <label for="password">Password</label>
                <br>
                <input type="password" id="password" required placeholder="enter password">
                <span class="toggle" onclick="togglePassword()">
                    <img id="eyeIcon" src="./assets/show.png" alt="show" width="20px">
                </span>
            </div>

            <div class="row">
                <button type="submit">SIGN IN</button>
            </div>

            <div class="link">
                do u have already account? <span><a href="./sign-up.html">click here</a></span>
            </div>
        </form>
    </div>

    <script src="./script.js"></script>
</body>

</html>
